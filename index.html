<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>帳單追蹤</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="帳單追蹤">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}

#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.login-icon{width:64px;height:64px;background:#1a1a1a;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;}
.login-icon svg{width:32px;height:32px;stroke:white;fill:none;}
#login-screen h1{font-size:24px;font-weight:600;margin-bottom:8px;}
#login-screen p{font-size:14px;color:#666;margin-bottom:2rem;line-height:1.6;}
.btn-google{display:flex;align-items:center;gap:10px;padding:12px 24px;background:white;border:1px solid #ddd;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.btn-google svg{width:20px;height:20px;}

#main-screen{display:none;max-width:480px;margin:0 auto;padding-bottom:80px;}
.topbar{background:white;padding:16px 16px 12px;border-bottom:1px solid #efefef;position:sticky;top:0;z-index:10;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:18px;font-weight:600;}
.user-info{display:flex;align-items:center;gap:8px;}
.uavatar{width:30px;height:30px;border-radius:50%;object-fit:cover;}
.btn-signout{font-size:12px;color:#999;background:none;border:none;cursor:pointer;padding:4px 8px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px;}
.month-nav button{width:30px;height:30px;border-radius:8px;border:1px solid #e8e8e8;background:transparent;cursor:pointer;font-size:16px;color:#1a1a1a;}
.month-lbl{font-size:15px;font-weight:500;}

.content{padding:16px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat{background:white;border-radius:12px;padding:14px 16px;}
.stat-lbl{font-size:12px;color:#888;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;}
.stat-val.g{color:#0a8a5c;}.stat-val.r{color:#c0392b;}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px;}

.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;padding:7px;border-radius:8px;border:1px solid #e8e8e8;background:white;font-size:13px;cursor:pointer;color:#888;transition:all .15s;}
.tab.on{background:#1a1a1a;color:white;border-color:#1a1a1a;}

.sec-lbl{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}

.bill-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.bi{background:white;border-radius:12px;border-left:3px solid #e8e8e8;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.bi.paid{border-left-color:#0a8a5c;}.bi.unpaid{border-left-color:#c0392b;}.bi.overdue{border-left-color:#d4830a;background:#fffbf0;}
.bi-logo{width:24px;height:24px;border-radius:6px;flex-shrink:0;object-fit:contain;background:#f0f0f0;padding:2px;}
.bi-info{flex:1;min-width:0;}
.bi-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bi-meta{font-size:11px;color:#aaa;margin-top:2px;}
.bi-amt{font-size:14px;font-weight:500;flex-shrink:0;}
.bdg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500;margin-left:4px;}
.bdg.paid{background:#e0f5ec;color:#0a8a5c;}.bdg.unpaid{background:#fde8e8;color:#c0392b;}.bdg.overdue{background:#fef3e0;color:#d4830a;}
.chk{width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.chk.on{background:#0a8a5c;border-color:#0a8a5c;}
.chk svg{width:13px;height:13px;}
.del-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:#ccc;font-size:16px;flex-shrink:0;line-height:1;}
.del-btn:hover{color:#c0392b;}
.empty{text-align:center;padding:2.5rem 0;color:#bbb;font-size:14px;}

.panel{background:white;border-radius:16px;padding:18px;margin-bottom:12px;}
.panel h3{font-size:15px;font-weight:600;margin-bottom:14px;}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:12px;color:#888;}
.fg input,.fg select{font-size:14px;height:38px;border-radius:8px;border:1px solid #e8e8e8;background:#fafafa;color:#1a1a1a;padding:0 10px;width:100%;outline:none;}
.fg input:focus,.fg select:focus{border-color:#aaa;background:white;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.btn-main{width:100%;margin-top:4px;padding:11px;font-size:14px;font-weight:600;border-radius:10px;background:#1a1a1a;color:white;border:none;cursor:pointer;}
.btn-main:disabled{opacity:.4;cursor:not-allowed;}


.bank-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.bank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border-radius:8px;border:1px solid #efefef;}
.bank-logo{width:22px;height:22px;border-radius:5px;object-fit:contain;background:#f0f0f0;padding:2px;flex-shrink:0;}
.bank-name{flex:1;font-size:13px;font-weight:500;}
.bank-due{font-size:12px;color:#aaa;white-space:nowrap;}
.bank-del{border:none;background:transparent;color:#ccc;cursor:pointer;font-size:16px;line-height:1;}
.bank-del:hover{color:#c0392b;}

.saving-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:8px 16px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.saving-toast.show{opacity:1;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-icon">
    <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
    </svg>
  </div>
  <h1>帳單追蹤</h1>
  <p>登入後即可管理你的信用卡帳單<br>資料安全儲存在雲端，隨時隨地存取</p>
  <button class="btn-google" id="btn-login">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    使用 Google 帳號登入
  </button>
</div>

<div id="main-screen">
  <div class="topbar">
    <div class="topbar-row">
      <h1>帳單追蹤</h1>
      <div class="user-info">
        <img class="uavatar" id="user-avatar" src="" alt="">
        <button class="btn-signout" id="btn-signout">登出</button>
      </div>
    </div>
    <div class="month-nav">
      <button onclick="chMon(-1)">‹</button>
      <span class="month-lbl" id="mon-lbl"></span>
      <button onclick="chMon(1)">›</button>
    </div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-lbl">已繳</div><div class="stat-val g" id="s-paid">0 張</div><div class="stat-sub" id="s-paid-amt"></div></div>
      <div class="stat"><div class="stat-lbl">未繳</div><div class="stat-val r" id="s-unpaid">0 張</div><div class="stat-sub" id="s-unpaid-amt"></div></div>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="setF('all',this)">全部</button>
      <button class="tab" onclick="setF('unpaid',this)">未繳</button>
      <button class="tab" onclick="setF('paid',this)">已繳</button>
    </div>

    <div class="sec-lbl">本月帳單</div>
    <div class="bill-list" id="bill-list"></div>

    <!-- 新增本月帳單 -->
    <div class="panel">
      <h3>新增本月帳單</h3>
      <div id="no-banks-hint" style="display:none;text-align:center;padding:.5rem 0 1rem;font-size:13px;color:#aaa;">請先至下方「管理銀行」新增銀行</div>
        <div id="quick-form">
          <div class="fg">
            <label>選擇銀行</label>
            <select id="q-bank-id"></select>
          </div>
          <div class="fg">
            <label>本期帳單金額 (NT$)</label>
            <input type="number" id="q-amount" placeholder="0">
          </div>
          <button class="btn-main" id="btn-quick-add" onclick="addBill()">新增</button>
        </div>
    </div>

    <!-- 管理銀行 -->
    <div class="panel">
      <h3>管理銀行</h3>
      <div class="bank-list" id="bank-list"></div>
      <div class="fg">
        <label>銀行名稱</label>
        <input type="text" id="b-name" placeholder="如：國泰世華、玉山、中信">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>截止日（幾號）</label>
          <input type="number" id="b-due" placeholder="25" min="1" max="31">
        </div>
        <div class="fg">
          <label>截止月份</label>
          <select id="b-due-month">
            <option value="same">帳單當月</option>
            <option value="next">帳單次月</option>
          </select>
        </div>
      </div>
      <button class="btn-main" id="btn-add-bank" onclick="addBank()">新增銀行</button>
    </div>
  </div>
</div>

<div class="saving-toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, collection, getDocs, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCVYbQRKBNSblX8q0tWbw7VnSZq0PNCbtU",
  authDomain: "credit-bill-tracker.firebaseapp.com",
  projectId: "credit-bill-tracker",
  storageBucket: "credit-bill-tracker.firebasestorage.app",
  messagingSenderId: "457819201693",
  appId: "1:457819201693:web:9f8908c52870740fe8b474"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
let currentUser = null;

document.getElementById('btn-login').addEventListener('click', async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); }
});
document.getElementById('btn-signout').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  window._getUser = () => currentUser;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('user-avatar').src = user.photoURL || '';
    await loadAll(user.uid);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
    window._data = { banks: [], bills: {}, payments: {} };
  }
});

async function loadAll(uid) {
  const [banksSnap, billsSnap, paysSnap] = await Promise.all([
    getDocs(collection(db, 'users', uid, 'banks')),
    getDocs(collection(db, 'users', uid, 'bills')),
    getDocs(collection(db, 'users', uid, 'payments')),
  ]);
  const banks = banksSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const bills = {}; billsSnap.docs.forEach(d => { bills[d.id] = d.data(); });
  const payments = {}; paysSnap.docs.forEach(d => { payments[d.id] = d.data(); });
  window._data = { banks, bills, payments };
  window.render();
}

window._saveBank = async (bank) => {
  const uid = window._getUser()?.uid; if (!uid) return;
  await setDoc(doc(db, 'users', uid, 'banks', bank.id), bank);
  showToast('銀行已儲存');
};
window._deleteBank = async (id) => {
  const uid = window._getUser()?.uid; if (!uid) return;
  await deleteDoc(doc(db, 'users', uid, 'banks', id));
};
window._saveBills = async (monthKey, obj) => {
  const uid = window._getUser()?.uid; if (!uid) return;
  await setDoc(doc(db, 'users', uid, 'bills', monthKey), obj);
};
window._savePayments = async (monthKey, obj) => {
  const uid = window._getUser()?.uid; if (!uid) return;
  await setDoc(doc(db, 'users', uid, 'payments', monthKey), obj);
};
</script>

<script>
let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth(), filter = 'all';
window._data = { banks: [], bills: {}, payments: {} };

// Bank domain lookup for favicon
const BANK_DOMAINS = {
  '國泰世華': 'cathaybk.com.tw',
  '國泰': 'cathaybk.com.tw',
  '玉山': 'esunbank.com.tw',
  '中信': 'ctbcbank.com',
  '中國信託': 'ctbcbank.com',
  '富邦': 'fubon.com',
  '台北富邦': 'fubon.com',
  '台新': 'taishinbank.com.tw',
  '永豐': 'sinopac.com',
  '第一銀行': 'firstbank.com.tw',
  '第一': 'firstbank.com.tw',
  '台灣銀行': 'bot.com.tw',
  '台銀': 'bot.com.tw',
  '合庫': 'tcb-bank.com.tw',
  '合作金庫': 'tcb-bank.com.tw',
  '兆豐': 'megabank.com.tw',
  '彰化銀行': 'bankchb.com.tw',
  '彰銀': 'bankchb.com.tw',
  '華南': 'hncb.com.tw',
  '遠東': 'feib.com.tw',
  '滙豐': 'hsbc.com.tw',
  'HSBC': 'hsbc.com.tw',
  '星展': 'dbs.com.tw',
  'DBS': 'dbs.com.tw',
  '花旗': 'citibank.com.tw',
  '聯邦': 'ubot.com.tw',
  '凱基': 'kgibank.com',
  '安泰': 'entiebank.com.tw',
  '上海商銀': 'scsb.com.tw',
  '京城': 'kccb.com.tw',
  '台中銀': 'bancotaiwan.com.tw',
  '大眾': 'tcbbank.com.tw',
};

function faviconUrl(bankName) {
  let domain = null;
  for (const [key, val] of Object.entries(BANK_DOMAINS)) {
    if (bankName.includes(key) || key.includes(bankName)) { domain = val; break; }
  }
  if (!domain) return null;
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
}

function bankLogoHtml(bank, cls) {
  const url = faviconUrl(bank.name);
  if (url) return `<img class="${cls}" src="${url}" alt="${bank.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="${cls}" style="display:none;background:#e8e8e8;color:#888;font-size:10px;font-weight:600;align-items:center;justify-content:center;">${bank.name[0]}</span>`;
  return `<span class="${cls}" style="background:#e8e8e8;color:#888;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;">${bank.name[0]}</span>`;
}

function mk(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }

function getStatus(bankId) {
  const k = mk(currentYear, currentMonth);
  if (window._data.payments[k]?.[bankId]) return 'paid';
  const bank = window._data.banks.find(b => b.id === bankId);
  if (!bank) return 'unpaid';
  const today = new Date();
  const isNext = bank.dueMonth === 'next';
  const dy = isNext ? (currentMonth===11 ? currentYear+1 : currentYear) : currentYear;
  const dm = isNext ? (currentMonth===11 ? 0 : currentMonth+1) : currentMonth;
  const due = new Date(dy, dm, bank.due);
  const viewingNow = currentYear===today.getFullYear() && currentMonth===today.getMonth();
  if (viewingNow && today > due) return 'overdue';
  return 'unpaid';
}

// ── Banks ──
async function addBank() {
  const name = document.getElementById('b-name').value.trim();
  if (!name) { document.getElementById('b-name').focus(); return; }
  const btn = document.getElementById('btn-add-bank');
  btn.disabled = true;
  const bank = {
    id: Date.now().toString(), name,
    due: parseInt(document.getElementById('b-due').value) || 25,
    dueMonth: document.getElementById('b-due-month').value,
  };
  window._data.banks.push(bank);
  render();
  await window._saveBank(bank);
  document.getElementById('b-name').value = '';
  document.getElementById('b-due').value = '';
  btn.disabled = false;
}
window.addBank = addBank;

async function deleteBank(id) {
  window._data.banks = window._data.banks.filter(b => b.id !== id);
  render();
  await window._deleteBank(id);
}
window.deleteBank = deleteBank;

// ── Bills ──
async function addBill() {
  const bankId = document.getElementById('q-bank-id').value;
  if (!bankId) return;
  const amount = parseInt(document.getElementById('q-amount').value) || 0;
  const k = mk(currentYear, currentMonth);
  if (!window._data.bills[k]) window._data.bills[k] = {};
  window._data.bills[k][bankId] = amount;
  render();
  await window._saveBills(k, window._data.bills[k]);
  document.getElementById('q-amount').value = '';
}
window.addBill = addBill;

async function deleteBill(bankId) {
  const k = mk(currentYear, currentMonth);
  if (window._data.bills[k]) { delete window._data.bills[k][bankId]; await window._saveBills(k, window._data.bills[k]); }
  if (window._data.payments[k]) { delete window._data.payments[k][bankId]; await window._savePayments(k, window._data.payments[k]); }
  render();
}
window.deleteBill = deleteBill;

async function togglePay(bankId) {
  const k = mk(currentYear, currentMonth);
  if (!window._data.payments[k]) window._data.payments[k] = {};
  window._data.payments[k][bankId] = !window._data.payments[k][bankId];
  if (!window._data.payments[k][bankId]) delete window._data.payments[k][bankId];
  render();
  await window._savePayments(k, window._data.payments[k]);
}
window.togglePay = togglePay;


// ── Helpers ──

function chMon(d) {
  currentMonth += d;
  if (currentMonth > 11) { currentMonth=0; currentYear++; }
  if (currentMonth < 0) { currentMonth=11; currentYear--; }
  render();
}
window.chMon = chMon;

function setF(f, btn) { filter=f; document.querySelectorAll('.tab').forEach(t => t.classList.remove('on')); btn.classList.add('on'); render(); }
window.setF = setF;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
window.showToast = showToast;

// ── Render ──
window.render = function() {
  const MONS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mon-lbl').textContent = `${currentYear} 年 ${MONS[currentMonth]}`;

  const k = mk(currentYear, currentMonth);
  const monthBills = window._data.bills[k] || {};

  let pN=0, uN=0, pA=0, uA=0;
  Object.entries(monthBills).forEach(([bankId, amount]) => {
    const s = getStatus(bankId);
    if (s==='paid') { pN++; pA+=amount; } else { uN++; uA+=amount; }
  });
  document.getElementById('s-paid').textContent = pN + ' 張';
  document.getElementById('s-unpaid').textContent = uN + ' 張';
  document.getElementById('s-paid-amt').textContent = pA>0 ? 'NT$ '+pA.toLocaleString() : '';
  document.getElementById('s-unpaid-amt').textContent = uA>0 ? 'NT$ '+uA.toLocaleString() : '';

  // Bill list
  const list = document.getElementById('bill-list');
  list.innerHTML = '';
  let entries = Object.entries(monthBills)
    .map(([bankId, amount]) => ({ bankId, amount, bank: window._data.banks.find(b => b.id===bankId) }))
    .filter(e => e.bank);
  if (filter==='paid') entries = entries.filter(e => getStatus(e.bankId)==='paid');
  if (filter==='unpaid') entries = entries.filter(e => getStatus(e.bankId)!=='paid');
  if (!entries.length) {
    const msg = Object.keys(monthBills).length===0 ? '本月尚無帳單，請從下方新增' : '此篩選無符合帳單';
    list.innerHTML = `<div class="empty">${msg}</div>`;
  } else {
    const order = {overdue:0, unpaid:1, paid:2};
    entries.sort((a,b) => (order[getStatus(a.bankId)]||1)-(order[getStatus(b.bankId)]||1) || a.bank.due-b.bank.due);
    const bdgMap = {paid:'<span class="bdg paid">已繳</span>', overdue:'<span class="bdg overdue">逾期</span>', unpaid:'<span class="bdg unpaid">未繳</span>'};
    entries.forEach(({ bankId, amount, bank }) => {
      const s = getStatus(bankId), paid = s==='paid';
      const dml = bank.dueMonth==='next' ? '次月' : '當月';
      const div = document.createElement('div');
      div.className = 'bi ' + s;
      div.innerHTML = `
        ${bankLogoHtml(bank, 'bi-logo')}
        <div class="bi-info">
          <div class="bi-name">${bank.name}${bdgMap[s]}</div>
          <div class="bi-meta">截止：${dml} ${bank.due} 日</div>
        </div>
        <span class="bi-amt">${amount>0 ? 'NT$ '+amount.toLocaleString() : '—'}</span>
        <button class="chk${paid?' on':''}" onclick="togglePay('${bankId}')">
          <svg viewBox="0 0 13 13" fill="none" stroke="${paid?'white':'#ccc'}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,10.5 11,3"/></svg>
        </button>
        <button class="del-btn" onclick="deleteBill('${bankId}')">×</button>`;
      list.appendChild(div);
    });
  }

  // Quick-add bank selector
  const sel = document.getElementById('q-bank-id');
  const prevVal = sel.value;
  sel.innerHTML = '';
  if (window._data.banks.length === 0) {
    document.getElementById('no-banks-hint').style.display = 'block';
    document.getElementById('quick-form').style.display = 'none';
  } else {
    document.getElementById('no-banks-hint').style.display = 'none';
    document.getElementById('quick-form').style.display = 'block';
    window._data.banks.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.id; opt.textContent = b.name;
      if (b.id === prevVal) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  // Bank management list
  const bankListEl = document.getElementById('bank-list');
  bankListEl.innerHTML = '';
  if (window._data.banks.length === 0) {
    bankListEl.innerHTML = '<div style="font-size:13px;color:#bbb;padding:2px 0 10px;">尚未新增任何銀行</div>';
  } else {
    window._data.banks.forEach(b => {
      const dml = b.dueMonth==='next' ? '次月' : '當月';
      const div = document.createElement('div');
      div.className = 'bank-item';
      div.innerHTML = `
        ${bankLogoHtml(b, 'bank-logo')}
        <span class="bank-name">${b.name}</span>
        <span class="bank-due">截止 ${dml} ${b.due} 日</span>
        <button class="bank-del" onclick="deleteBank('${b.id}')">×</button>`;
      bankListEl.appendChild(div);
    });
  }
};
</script>
</body>
</html>
